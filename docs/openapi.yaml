openapi: 3.0.3
info:
  title: HMS Backend (Auto-generated Role Matrix)
  version: '1.0.0'
  description: Minimal OpenAPI skeleton describing primary endpoints and security.
servers:
  - url: https://hospital-management-system-c1h9.onrender.com
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string

paths:
  /api/auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
      responses:
        '201':
          description: Created
        '400':
          description: Bad request

  /api/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized

  /api/patients:
    get:
      summary: List patients (authorized roles)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Create patient
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created

  /api/patients/{id}:
    put:
      summary: Update patient
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete patient
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        '204':
          description: Deleted

  /api/doctors:
    get:
      summary: List doctors
      responses:
        '200':
          description: OK
    post:
      summary: Create doctor (admin)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created

  /api/appointments:
    get:
      summary: List appointments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Create appointment
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created

  /api/appointments/{id}/status:
    patch:
      summary: Update appointment status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        '200':
          description: Updated

  /api/medical-records:
    post:
      summary: Create medical record (doctor/admin)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created

  /api/prescriptions:
    get:
      summary: List prescriptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Create prescription (doctor)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created

  /api/pharmacy:
    get:
      summary: Pharmacy listing (pharmacist/admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  /api/payments:
    post:
      summary: Create payment (patient)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created

  /api/ward/admit:
    post:
      summary: Admit patient to ward
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Admitted
